<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOICE QUEST</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #3b2a1a;
    --bg-dark: #2a1d10;
    --panel: #c4a46a;
    --panel-light: #d4b87a;
    --panel-dark: #a88a50;
    --panel-shadow: #8a6e3a;
    --border: #5a3e20;
    --border-dark: #3e2a14;
    --gold: #d4a020;
    --gold-dark: #a07818;
    --gold-light: #e8c040;
    --text: #3b2a1a;
    --text-dim: #7a6040;
    --blue: #4a6a8a;
    --blue-light: #6a9abe;
    --blue-dark: #3a5470;
    --pink: #b05a6a;
    --pink-light: #d07a8a;
    --pink-dark: #8a3a4a;
    --green: #5a8a3a;
    --red: #a04030;
    --pixel: 'Press Start 2P', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--pixel);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px;
    image-rendering: pixelated;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.06;
    background-image: url("data:image/svg+xml,%3Csvg width='4' height='4' viewBox='0 0 4 4' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='0' y='0' width='2' height='2' fill='%23000'/%3E%3Crect x='2' y='2' width='2' height='2' fill='%23000'/%3E%3C/svg%3E");
    background-size: 4px 4px;
    pointer-events: none;
  }
  .game-container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    margin-top: auto;
    margin-bottom: auto;
  }
  body.has-results .game-container {
    margin-top: 0;
    margin-bottom: 0;
  }
  body.has-results .main-panel {
    display: none;
  }
  body.has-results .panel-footer {
    display: none;
  }

  /* Main panel */
  .main-panel {
    background: var(--panel);
    border: 4px solid var(--border);
    box-shadow:
      inset 0 0 0 2px var(--panel-light),
      0 6px 0 var(--border-dark),
      0 8px 20px rgba(0,0,0,0.5);
  }
  .panel-bar {
    background: var(--border);
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel-bar-title { font-size: 0.55rem; color: var(--panel); letter-spacing: 1px; }
  .panel-bar-close { font-size: 0.55rem; color: var(--panel-dark); }
  .panel-body { padding: 24px 20px 20px; }

  /* Header */
  .header { text-align: center; margin-bottom: 16px; }
  .header h1 { font-size: 1rem; color: var(--text); letter-spacing: 2px; margin-bottom: 6px; }
  .header .sub { font-size: 0.45rem; color: var(--text-dim); letter-spacing: 1px; }

  /* Dot divider */
  .dot-divider { display: flex; justify-content: center; gap: 4px; margin: 14px 0; }
  .dot-divider span { width: 6px; height: 6px; background: var(--gold); display: block; }

  /* Pixel art SVGs */
  .pixel-art-container {
    display: flex;
    justify-content: center;
    margin: 12px 0 16px;
  }
  .pixel-art-container svg {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* Pixel wave bars */
  .pixel-waves {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 3px;
    height: 28px;
    margin: 6px 0 14px;
  }
  .pixel-wave-bar {
    width: 6px;
    background: var(--border);
    transition: height 0.1s;
  }

  /* Record */
  .record-label {
    font-size: 0.45rem;
    color: var(--text);
    text-align: center;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }
  .record-area {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #record-btn {
    width: 100%;
    padding: 14px 20px;
    background: var(--gold);
    border: 3px solid var(--gold-dark);
    box-shadow: inset 0 -3px 0 var(--gold-dark), inset 0 2px 0 var(--gold-light), 0 4px 0 var(--border-dark);
    font-family: var(--pixel);
    font-size: 0.55rem;
    color: var(--text);
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #record-btn:hover { background: var(--gold-light); }
  #record-btn:active {
    box-shadow: inset 0 2px 0 var(--gold-dark), 0 1px 0 var(--border-dark);
    transform: translateY(3px);
  }
  #record-btn.recording {
    background: var(--red);
    border-color: #7a2820;
    box-shadow: inset 0 -3px 0 #7a2820, inset 0 2px 0 #c05040, 0 4px 0 var(--border-dark);
    color: #fdd;
  }
  #record-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Progress bar */
  .progress-wrapper { width: 100%; margin-top: 8px; display: none; }
  .progress-wrapper.active { display: block; }
  .progress-track {
    height: 12px;
    background: var(--panel-dark);
    border: 2px solid var(--border);
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: var(--green);
    width: 0%;
    transition: width 0.1s linear;
  }
  .progress-segs {
    position: absolute;
    inset: 0;
    display: flex;
  }
  .progress-segs div {
    flex: 1;
    border-right: 2px solid var(--panel-dark);
  }
  .progress-segs div:last-child { border: none; }

  /* Timer */
  .timer-row { margin-top: 8px; text-align: center; min-height: 18px; }
  #timer { font-size: 0.45rem; color: var(--text-dim); font-variant-numeric: tabular-nums; }
  #timer.active { color: var(--red); }

  /* Status */
  #status {
    margin-top: 8px;
    font-size: 0.4rem;
    color: var(--text-dim);
    text-align: center;
    min-height: 14px;
    letter-spacing: 0.5px;
  }
  @keyframes blink { 0%,49%{opacity:1}50%,100%{opacity:0} }
  #status.analyzing { color: var(--text); animation: blink 0.6s step-end infinite; }

  /* Footer */
  .panel-footer {
    font-size: 0.35rem;
    color: var(--text-dim);
    text-align: center;
    margin-top: 8px;
    letter-spacing: 0.5px;
  }
  .page-footer {
    margin-top: 14px;
    font-size: 0.3rem;
    color: var(--panel-shadow);
    text-align: center;
    letter-spacing: 1px;
  }

  /* ===== RESULTS ===== */
  #result { width: 100%; display: none; margin-top: 12px; }
  #result .result-panel-wrap {
    background: var(--panel);
    border: 4px solid var(--border);
    box-shadow:
      inset 0 0 0 2px var(--panel-light),
      0 6px 0 var(--border-dark),
      0 8px 20px rgba(0,0,0,0.5);
    padding: 20px;
  }
  @keyframes drop-in {
    0% { opacity: 0; transform: translateY(-20px); }
    60% { transform: translateY(4px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes bob {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }
  .result-anim { animation: drop-in 0.4s ease-out forwards; }

  .char-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 14px;
  }
  .char-sprite {
    margin-bottom: 8px;
  }
  .char-sprite svg { animation: bob 1.5s ease-in-out infinite; }
  .char-name {
    font-size: 0.75rem;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .char-name.male { color: var(--blue); }
  .char-name.female { color: var(--pink); }
  .char-title {
    font-size: 0.4rem;
    color: var(--gold-dark);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .char-quip {
    font-size: 0.35rem;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.8;
    max-width: 260px;
    margin: 0 auto;
  }

  /* Battle bar */
  .battle-section {
    margin: 12px 0;
    padding: 12px 0;
    border-top: 3px solid var(--panel-dark);
    border-bottom: 3px solid var(--panel-dark);
  }
  .battle-heads {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .battle-side { display: flex; align-items: center; gap: 6px; }
  .battle-dot { width: 8px; height: 8px; }
  .battle-dot.m { background: var(--blue); }
  .battle-dot.f { background: var(--pink); }
  .battle-tag { font-size: 0.35rem; letter-spacing: 1px; }
  .battle-tag.m { color: var(--blue); }
  .battle-tag.f { color: var(--pink); }
  .battle-track {
    height: 16px;
    background: var(--panel-dark);
    border: 2px solid var(--border);
    display: flex;
    overflow: hidden;
  }
  .battle-fill-m {
    background: var(--blue);
    transition: width 0.6s ease-out;
    display: flex; align-items: center; justify-content: center;
  }
  .battle-fill-f {
    background: var(--pink);
    transition: width 0.6s ease-out;
    display: flex; align-items: center; justify-content: center;
  }
  .battle-pct {
    font-size: 0.3rem;
    color: #fff;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
  }

  /* Stats */
  .stats-title {
    font-size: 0.4rem;
    color: var(--text);
    letter-spacing: 2px;
    margin-bottom: 8px;
    margin-top: 12px;
  }
  .stat-line {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    border-bottom: 2px dotted var(--panel-dark);
  }
  .stat-line:last-child { border-bottom: none; }
  .stat-k { font-size: 0.35rem; color: var(--text-dim); letter-spacing: 0.5px; }
  .stat-v { font-size: 0.4rem; color: var(--text); font-variant-numeric: tabular-nums; }
  .stat-v.high { color: var(--green); }
  .stat-v.low { color: var(--gold-dark); }

  /* Share */
  .share-area {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 3px solid var(--panel-dark);
    text-align: center;
  }
  .share-label {
    font-size: 0.35rem;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .share-btns { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
  .share-btn {
    font-family: var(--pixel);
    font-size: 0.35rem;
    padding: 8px 12px;
    background: var(--panel-dark);
    border: 2px solid var(--border);
    box-shadow: 0 2px 0 var(--border-dark);
    color: var(--text);
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.1s;
    text-decoration: none;
    display: inline-block;
  }
  .share-btn:hover { background: var(--gold); border-color: var(--gold-dark); }
  .share-btn:active { transform: translateY(2px); box-shadow: none; }

  /* Error */
  .error-box { text-align: center; padding: 16px; }
  .error-box .err-text { font-size: 0.4rem; color: var(--red); line-height: 1.8; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    font-family: var(--pixel);
    font-size: 0.35rem;
    background: var(--green);
    color: #fff;
    padding: 10px 16px;
    border: 2px solid #3a6a1a;
    box-shadow: 0 3px 0 #2a4a10;
    opacity: 0;
    transition: all 0.2s;
    z-index: 200;
    letter-spacing: 0.5px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="game-container">
  <div class="main-panel">
    <div class="panel-bar">
      <span class="panel-bar-title">VOICE QUEST</span>
      <span class="panel-bar-close">[X]</span>

      <!-- Pixel mic SVG -->

          <rect x="3" y="11" width="6" height="1" fill="#5a3e20"/>
          <rect x="3" y="12" width="6" height="1" fill="#3e2a14"/>

          <rect x="5" y="2" width="1" height="1" fill="#777"/>
          <rect x="5" y="4" width="1" height="1" fill="#777"/>
          <rect x="6" y="3" width="1" height="1" fill="#777"/>
        </svg>
      </div>

      <!-- Pixel equalizer -->
      <div class="pixel-waves" id="pixel-waves">
        <div class="pixel-wave-bar" style="height:4px"></div>
        <div class="pixel-wave-bar" style="height:6px"></div>
        <div class="pixel-wave-bar" style="height:10px"></div>
        <div class="pixel-wave-bar" style="height:14px"></div>
        <div class="pixel-wave-bar" style="height:20px"></div>
        <div class="pixel-wave-bar" style="height:14px"></div>
        <div class="pixel-wave-bar" style="height:10px"></div>
        <div class="pixel-wave-bar" style="height:6px"></div>
        <div class="pixel-wave-bar" style="height:4px"></div>
      </div>

      <div class="record-label">TAP TO SPEAK INTO THE VOID</div>
      <div class="record-area">
        <button id="record-btn">
          <span id="btn-text">START RECORDING</span>
        </button>
        <div class="progress-wrapper" id="progress-bar">
          <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
            <div class="progress-segs"><div></div><div></div><div></div><div></div><div></div></div>

  </div>
  <div id="result"></div>
  <div class="panel-footer">YOU'LL GET YOUR VOICE VERDICT</div>
  <div class="page-footer">F0 PITCH ANALYSIS VIA PRAAT ENGINE</div>
</div>
<div class="toast" id="toast"></div>

<script>
let mediaRecorder=null,chunks=[],startTime=0,timerInterval=null,
    audioContext=null,analyserNode=null,autoStopTimeout=null,
    waveAnimFrame=null,lastResultData=null;

const btn=document.getElementById('record-btn'),
      btnText=document.getElementById('btn-text'),
      timerEl=document.getElementById('timer'),
      statusEl=document.getElementById('status'),
      resultEl=document.getElementById('result'),
      progressBar=document.getElementById('progress-bar'),
      progressFill=document.getElementById('progress-fill'),
      toast=document.getElementById('toast'),
      waveBars=document.querySelectorAll('.pixel-wave-bar');

// ===== PIXEL ART SVG STRINGS =====

// Female character: pink/red hair, dress, boots

  <rect x="7" y="3" width="1" height="1" fill="#3b2a1a"/>
  <!-- blush -->
  <rect x="3" y="4" width="1" height="1" fill="#d09080"/>
  <rect x="8" y="4" width="1" height="1" fill="#d09080"/>
  <!-- nose & mouth -->
  <rect x="2" y="4" width="1" height="1" fill="#d4a46a"/>
  <rect x="9" y="4" width="1" height="1" fill="#d4a46a"/>
  <rect x="4" y="4" width="4" height="1" fill="#d4a46a"/>
  <rect x="5" y="5" width="2" height="1" fill="#e0a0a0"/>
  <rect x="3" y="5" width="2" height="1" fill="#d4a46a"/>
  <rect x="7" y="5" width="2" height="1" fill="#d4a46a"/>
  <!-- dress top -->
  <rect x="2" y="6" width="8" height="1" fill="#b05a6a"/>
  <rect x="2" y="7" width="8" height="1" fill="#d07a8a"/>
  <!-- arms -->
  <rect x="0" y="7" width="2" height="1" fill="#d4a46a"/>
  <rect x="10" y="7" width="2" height="1" fill="#d4a46a"/>
  <!-- dress skirt -->
  <rect x="1" y="8" width="10" height="1" fill="#b05a6a"/>
  <rect x="1" y="9" width="10" height="1" fill="#d07a8a"/>
  <rect x="0" y="10" width="12" height="1" fill="#b05a6a"/>
  <rect x="1" y="11" width="10" height="1" fill="#8a3a4a"/>
  <!-- dress pattern -->
  <rect x="4" y="9" width="1" height="1" fill="#b05a6a"/>
  <rect x="7" y="9" width="1" height="1" fill="#b05a6a"/>
  <!-- boots -->
  <rect x="2" y="12" width="3" height="1" fill="#3e2a14"/>
  <rect x="7" y="12" width="3" height="1" fill="#3e2a14"/>
</svg>`;

const maleTitles = [
  'BASS LORD', 'THE RUMBLER', 'BARITONE BANDIT',
  'VOICE OF THUNDER', 'SIR GROWLS-A-LOT', 'THE SUBWOOFER',
];
const femaleTitles = [
  'SOPRANO QUEEN', 'PITCH ROYALTY', 'TREBLE CHAMPION',
  'THE SONGBIRD', 'CRYSTAL VOICE', 'THE HIGH ROLLER',
];
const maleQuips = [
  '"Your voice could start a lawnmower"',
  '"Subwoofers everywhere are jealous"',
  '"You could narrate nature docs"',
  '"Your vocal cords bench 200Hz"',
  '"Batman voice: ACTIVATED"',
  '"Somewhere, a tuba is blushing"',
];
const femaleQuips = [
  '"Dolphins called, they wanna collab"',
  '"Mariah Carey wants your secrets"',
  '"Glass just shattered somewhere"',
  '"Auto-tune just rage-quit"',
  '"Your pitch broke the high score"',
  '"Pixies are taking notes rn"',
];
const lowQuips = [
  '"Your voice chose: CHAOS"',
  '"The algorithm is sweating rn"',
  '"Congrats, you broke science"',
  '"Gender? Your voice said: NO"',
];

function pick(a) { return a[Math.floor(Math.random() * a.length)]; }
function formatTime(ms) {
  return Math.floor(ms/1000) + '.' + Math.floor((ms%1000)/100) + 's';
}
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}
function getShareText(d) {
  const g = d.gender === 'female' ? 'FEMALE' : 'MALE';
  const p = d.gender === 'female' ? d.female_probability : d.male_probability;
  return 'VOICE QUEST RESULT\n\nMy voice is ' + p + '% ' + g + '\nPitch: ' + d.f0_median + ' Hz\nConfidence: ' + d.confidence + '\n\nTry it yourself: voice-quest.whhite.com';
}

function animateWaves() {
  if (!analyserNode) return;
  const data = new Uint8Array(analyserNode.frequencyBinCount);
  analyserNode.getByteFrequencyData(data);
  const step = Math.floor(data.length / waveBars.length);
  waveBars.forEach((bar, i) => {
    bar.style.height = Math.max(4, (data[i * step] / 255) * 28) + 'px';
  });
  waveAnimFrame = requestAnimationFrame(animateWaves);
}
function resetWaves() {
  cancelAnimationFrame(waveAnimFrame);
  [4,6,10,14,20,14,10,6,4].forEach((h,i) => { waveBars[i].style.height = h+'px'; });
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus' : 'audio/webm';
    mediaRecorder = new MediaRecorder(stream, { mimeType });
    chunks = [];
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioContext.createMediaStreamSource(stream);
    analyserNode = audioContext.createAnalyser();
    analyserNode.fftSize = 256;
    source.connect(analyserNode);

    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      resetWaves();
      if (audioContext) { audioContext.close(); audioContext = null; analyserNode = null; }
      await analyzeAudio(new Blob(chunks, { type: mimeType }));
    };

    mediaRecorder.start(100);
    startTime = Date.now();
    btn.classList.add('recording');
    btnText.textContent = 'LISTENING...';
    timerEl.classList.add('active');
    progressBar.classList.add('active');
    animateWaves();

    timerInterval = setInterval(() => {
      const elapsed = Date.now() - startTime;
      timerEl.textContent = formatTime(elapsed);
      progressFill.style.width = Math.min((elapsed / 3000) * 100, 100) + '%';
    }, 50);
    autoStopTimeout = setTimeout(() => stopRecording(), 3000);
  } catch (err) {
    statusEl.textContent = 'MIC ACCESS DENIED!';
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    clearTimeout(autoStopTimeout);
    clearInterval(timerInterval);
    mediaRecorder.stop();
    btn.classList.remove('recording');
    btnText.textContent = 'START RECORDING';
    timerEl.classList.remove('active');
    progressBar.classList.remove('active');
    progressFill.style.width = '0%';
  }
}

async function analyzeAudio(blob) {
  statusEl.textContent = 'ANALYZING YOUR VIBE...';
  statusEl.classList.add('analyzing');
  btn.disabled = true;
  const fd = new FormData();
  fd.append('audio', blob, 'recording.webm');

  try {
    const res = await fetch('/analyze', { method: 'POST', body: fd });
    const d = await res.json();

    if (d.error) {
      resultEl.innerHTML = `
        <div class="result-panel-wrap">
          <div class="error-box">
            <div class="err-text">GAME OVER!<br>${d.error}</div>
          </div>
        </div>`;
    } else {
      lastResultData = d;
      const isFemale = d.gender === 'female';
      const isHigh = d.confidence === 'high';
      const title = pick(isFemale ? femaleTitles : maleTitles);
      const quip = isHigh ? pick(isFemale ? femaleQuips : maleQuips) : pick(lowQuips);
      const cls = isFemale ? 'female' : 'male';
      const label = isFemale ? 'FEMALE' : 'MALE';
      const sprite = isFemale ? FEMALE_SVG : MALE_SVG;
      const shareText = encodeURIComponent(getShareText(d));

      resultEl.innerHTML = `
        <div class="result-panel-wrap result-anim">
          <div class="char-area">
            <div class="char-sprite">${sprite}</div>
            <div class="char-name ${cls}">${label}</div>
            <div class="char-title">"${title}"</div>
            <div class="char-quip">${quip}</div>
          </div>
          <div class="battle-section">
            <div class="battle-heads">
              <div class="battle-side">
                <div class="battle-dot m"></div>
                <span class="battle-tag m">MALE</span>
              </div>
              <div class="battle-side">
                <span class="battle-tag f">FEMALE</span>
                <div class="battle-dot f"></div>
              </div>
            </div>
            <div class="battle-track">
              <div class="battle-fill-m" style="width:${d.male_probability}%">
                ${d.male_probability > 14 ? '<span class="battle-pct">'+d.male_probability+'%</span>' : ''}
              </div>
              <div class="battle-fill-f" style="width:${d.female_probability}%">
                ${d.female_probability > 14 ? '<span class="battle-pct">'+d.female_probability+'%</span>' : ''}
              </div>
            </div>
          </div>
          <div class="stats-title">VOICE STATS</div>
          <div class="stat-line">
            <span class="stat-k">MEDIAN PITCH</span>
            <span class="stat-v">${d.f0_median} Hz</span>
          </div>
          <div class="stat-line">
            <span class="stat-k">MEAN PITCH</span>
            <span class="stat-v">${d.f0_mean} Hz</span>
          </div>
          <div class="stat-line">
            <span class="stat-k">RANGE</span>
            <span class="stat-v">${d.f0_min} - ${d.f0_max} Hz</span>
          </div>
          <div class="stat-line">
            <span class="stat-k">DURATION</span>
            <span class="stat-v">${d.duration_seconds}s</span>
          </div>
          <div class="stat-line">
            <span class="stat-k">CONFIDENCE</span>
            <span class="stat-v ${isHigh ? 'high' : 'low'}">${d.confidence.toUpperCase()}</span>
          </div>
          <div class="share-area">
            <div class="share-label">- SHARE YOUR SCORE -</div>
            <div class="share-btns">
              <button class="share-btn" onclick="copyResult()">COPY</button>
              <a class="share-btn" href="https://twitter.com/intent/tweet?text=${shareText}" target="_blank" rel="noopener">TWEET</a>
              <a class="share-btn" href="https://wa.me/?text=${shareText}" target="_blank" rel="noopener">WHATSAPP</a>
            </div>
          </div>
          <div style="text-align:center;margin-top:14px;">
            <button class="share-btn" onclick="tryAgain()" style="background:var(--gold);border-color:var(--gold-dark);">TRY AGAIN</button>
          </div>
        </div>
        `;
    }
    resultEl.style.display = 'block';
    document.body.classList.add('has-results');
  } catch (err) {
    resultEl.innerHTML = `<div class="error-box"><div class="err-text">CRITICAL HIT!<br>${err.message}</div></div>`;
    resultEl.style.display = 'block';
  }
  statusEl.textContent = '';
  statusEl.classList.remove('analyzing');
  btn.disabled = false;
}

function tryAgain() {
  resultEl.style.display = 'none';
  document.body.classList.remove('has-results');
  window.scrollTo(0, 0);
}

function copyResult() {
  if (!lastResultData) return;
  navigator.clipboard.writeText(getShareText(lastResultData)).then(() => {
    showToast('COPIED! GO FLEX ON YOUR FRIENDS');
  }).catch(() => { showToast('COPY FAILED :('); });
}

btn.addEventListener('click', (e) => {
  e.preventDefault();
  if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
  else startRecording();
});
</script>
</body>
</html>
